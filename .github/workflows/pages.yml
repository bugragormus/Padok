name: Deploy Padok Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "37 8,18 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GAZI_YEAR: "2026"
      GAZI_START_DATE: "01.03.2026"
      GAZI_END_DATE: "30.06.2026"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Run tests
        run: npm test

      - name: Initialize runtime database
        run: |
          mkdir -p data/raw data/processed
          sqlite3 data/padok.sqlite < db/schema.sql

      - name: Fetch race index
        run: |
          npm run fetch:tjk-race-index -- \
            --start "$GAZI_START_DATE" \
            --end "$GAZI_END_DATE" \
            --page 1 \
            --pages 20 \
            --until-empty

      - name: Import race index
        run: npm run import:tjk-race-index -- --input data/processed/tjk/kosu-sorgulama

      - name: Fetch named races
        run: npm run fetch:tjk-named-races -- --page 1 --pages 30 --until-empty

      - name: Import named races
        run: npm run import:tjk-named-races -- --input data/processed/tjk/named-races

      - name: Refresh historical Gazi route data
        run: npm run refresh:gazi-route -- --year 2025 --out data/gazi-route-2025.json

      - name: Refresh current Gazi route data
        run: npm run refresh:gazi-route -- --year "$GAZI_YEAR" --out data/gazi-route-2026.json

      - name: Build historical Gazi route backtest
        run: |
          npm run backtest:gazi-route -- \
            --input data/gazi-route-2020.json \
            --input data/gazi-route-2021.json \
            --input data/gazi-route-2022.json \
            --input data/gazi-route-2023.json \
            --input data/gazi-route-2024.json \
            --input data/gazi-route-2025.json \
            --out data/gazi-backtest-report.json

      - name: Select default Gazi route report
        run: |
          npm run select:gazi-route -- \
            --preferred data/gazi-route-2026.json \
            --fallback data/gazi-route-2025.json \
            --out data/gazi-route-report.json

      - name: Build Gazi participation matrix
        run: npm run build:gazi-participation -- --input data/gazi-route-report.json --out data/gazi-participation-report.json

      - name: Build yearly Gazi participation matrices
        run: |
          for report in data/gazi-route-*.json; do
            year="${report#data/gazi-route-}"
            year="${year%.json}"
            npm run build:gazi-participation -- --input "$report" --out "data/gazi-participation-${year}.json"
          done

      - name: Build Gazi readiness report
        run: |
          comparisons=""
          for participation in data/gazi-participation-[0-9][0-9][0-9][0-9].json; do
            comparisons="$comparisons --comparison $participation"
          done
          npm run build:gazi-readiness -- \
            --input data/gazi-participation-report.json \
            $comparisons \
            --out data/gazi-readiness-report.json
          for participation in data/gazi-participation-[0-9][0-9][0-9][0-9].json; do
            year="${participation#data/gazi-participation-}"
            year="${year%.json}"
            npm run build:gazi-readiness -- \
              --input "$participation" \
              $comparisons \
              --out "data/gazi-readiness-${year}.json"
          done

      - name: Build Gazi model backtest
        run: |
          inputs=""
          for readiness in data/gazi-readiness-[0-9][0-9][0-9][0-9].json; do
            inputs="$inputs --input $readiness"
          done
          npm run build:gazi-model-backtest -- $inputs --out data/gazi-model-backtest.json

      - name: Build Gazi signal calibration
        run: |
          inputs=""
          for readiness in data/gazi-readiness-[0-9][0-9][0-9][0-9].json; do
            inputs="$inputs --input $readiness"
          done
          npm run build:gazi-signal-calibration -- $inputs --out data/gazi-signal-calibration.json

      - name: Build Gazi data horizon
        run: npm run build:gazi-data-horizon -- --data-dir data --out data/gazi-data-horizon.json

      - name: Build data manifest
        run: npm run build:data-manifest -- --data-dir data --out data/padok-data-manifest.json

      - name: Build Gazi decision brief
        run: npm run build:gazi-decision-brief -- --out data/gazi-decision-brief.json

      - name: Build Gazi candidate comparison
        run: npm run build:gazi-candidate-comparison -- --out data/gazi-candidate-comparison.json

      - name: Build Gazi race day watchlist
        run: npm run build:gazi-race-day-watchlist -- --out data/gazi-race-day-watchlist.json

      - name: Build API index
        run: npm run build:api-index -- --out data/padok-api-index.json

      - name: Prepare static site
        run: |
          mkdir -p dist/assets dist/data dist/scripts
          cp index.html app.js styles.css .nojekyll dist/
          cp assets/* dist/assets/
          cp scripts/readiness-model.mjs dist/scripts/
          cp data/gazi-knowledge-base.json data/gazi-route-report.json data/gazi-route-2020.json data/gazi-route-2021.json data/gazi-route-2022.json data/gazi-route-2023.json data/gazi-route-2024.json data/gazi-route-2025.json data/gazi-route-2026.json data/gazi-backtest-report.json data/gazi-model-backtest.json data/gazi-signal-calibration.json data/gazi-decision-brief.json data/gazi-candidate-comparison.json data/gazi-race-day-watchlist.json data/gazi-participation-report.json data/gazi-participation-*.json data/gazi-readiness-report.json data/gazi-readiness-*.json data/gazi-data-horizon.json data/padok-data-manifest.json data/padok-api-index.json dist/data/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
